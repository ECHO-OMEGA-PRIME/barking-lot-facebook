name = "barking-lot-facebook"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
FB_PAGE_ID = "105558179275338"
FB_APP_ID = "1806111116775315"
ALLOWED_ORIGINS = "https://barkinglot.org,https://www.barkinglot.org,http://localhost:3000"

[[kv_namespaces]]
binding = "CACHE"
id = "cc36208542224f3d827e7f1ee7e29885"

[ai]
binding = "AI"

# Daily cron to refresh Facebook data
[triggers]
crons = ["0 6 * * *"]

# Secrets (set via wrangler secret put):
# FB_PAGE_TOKEN - Facebook Page Access Token
# FB_APP_SECRET - Facebook App Secret
# FB_VERIFY_TOKEN - Messenger webhook verify token

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "echo_metrics"
